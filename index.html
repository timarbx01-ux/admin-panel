<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel – Game Studio</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --accent-soft: rgba(56,189,248,0.15);
            --text: #e5e7eb;
            --muted: #9ca3af;
            --danger: #ef4444;
            --success: #22c55e;
        }

        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(148,163,184,0.3);
        }

        .title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 22px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input[type="password"] {
            flex: 1;
            padding: 12px 14px;
            border-radius: 999px;
            border: 1px solid rgba(148,163,184,0.6);
            background: #020617;
            color: var(--text);
        }

        button {
            padding: 12px 18px;
            border-radius: 999px;
            border: none;
            background: var(--accent);
            color: #0f172a;
            font-weight: 600;
            cursor: pointer;
        }

        .error {
            margin-top: 10px;
            font-size: 13px;
            color: var(--danger);
            display: none;
        }

        .panel {
            display: none;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 14px;
        }

        th, td {
            padding: 10px 8px;
            text-align: left;
        }

        th {
            color: var(--muted);
            border-bottom: 1px solid rgba(148,163,184,0.4);
        }

        tr {
            border-bottom: 1px solid rgba(148,163,184,0.2);
        }

        tr:hover {
            background: rgba(255,255,255,0.05);
        }

        .status {
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 12px;
        }

        .status-new { background: rgba(59,130,246,0.15); color: #60a5fa; }
        .status-accepted { background: rgba(34,197,94,0.15); color: #4ade80; }
        .status-dev { background: rgba(234,179,8,0.15); color: #facc15; }
        .status-check { background: rgba(249,115,22,0.15); color: #fdba74; }
        .status-ready { background: rgba(16,185,129,0.15); color: #6ee7b7; }
        .status-delivered { background: rgba(147,51,234,0.15); color: #c4b5fd; }

        .actions button {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 999px;
            margin-right: 6px;
        }

        .btn-status {
            background: rgba(56,189,248,0.15);
            color: var(--accent);
        }

        .btn-delete {
            background: rgba(239,68,68,0.15);
            color: var(--danger);
        }
    </style>
</head>
<body>

<div class="card">
    <div class="title">Админ‑панель</div>
    <div class="subtitle">Вход только для владельца</div>

    <div id="login-block">
        <div class="input-group">
            <input type="password" id="password" placeholder="Введите пароль">
            <button id="login-btn">Войти</button>
        </div>
        <div class="error" id="error-msg">Неверный пароль</div>
    </div>

    <div class="panel" id="admin-panel">
        <button id="refresh-btn">Обновить</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Пользователь</th>
                    <th>Игра</th>
                    <th>Статус</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody id="orders-body"></tbody>
        </table>
    </div>
</div>

<script>
    const PASSWORD = "071014";
    const API = "https://YOUR_API_URL/api";

    const loginBlock = document.getElementById("login-block");
    const adminPanel = document.getElementById("admin-panel");
    const errorMsg = document.getElementById("error-msg");
    const ordersBody = document.getElementById("orders-body");

    let orders = [];

    function statusClass(s) {
        return {
            "Новый": "status status-new",
            "Принят": "status status-accepted",
            "В разработке": "status status-dev",
            "На проверке": "status status-check",
            "Готов": "status status-ready",
            "Передан клиенту": "status status-delivered"
        }[s] || "status";
    }

    async function loadOrders() {
        const res = await fetch(`${API}/orders`);
        orders = await res.json();
        renderOrders();
    }

    function renderOrders() {
        ordersBody.innerHTML = "";
        orders.forEach(o => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${o.id}</td>
                <td>${o.user}</td>
                <td>${o.game}</td>
                <td><span class="${statusClass(o.status)}">${o.status}</span></td>
                <td class="actions">
                    <button class="btn-status" data-id="${o.id}">Статус</button>
                    <button class="btn-delete" data-id="${o.id}">Удалить</button>
                </td>
            `;
            ordersBody.appendChild(tr);
        });
    }

    async function updateStatus(id, status) {
        await fetch(`${API}/orders/update`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id, status })
        });
        loadOrders();
    }

    async function deleteOrder(id) {
        await fetch(`${API}/orders/delete`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ id })
        });
        loadOrders();
    }

    document.getElementById("login-btn").onclick = () => {
        if (document.getElementById("password").value === PASSWORD) {
            loginBlock.style.display = "none";
            adminPanel.style.display = "block";
            loadOrders();
        } else {
            errorMsg.style.display = "block";
        }
    };

    document.getElementById("refresh-btn").onclick = loadOrders;

    ordersBody.onclick = (e) => {
        const id = e.target.dataset.id;
        if (!id) return;

        if (e.target.classList.contains("btn-delete")) {
            deleteOrder(id);
        }

        if (e.target.classList.contains("btn-status")) {
            const next = prompt("Введите новый статус:");
            if (next) updateStatus(id, next);
        }
    };
</script>

</body>
</html>
